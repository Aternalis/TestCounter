<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domino - Page 1</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        /* Navigation Bar Styles */
        .nav-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 400px;
        }

        .nav-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            border: 2px solid #555;
        }

        .nav-btn.active {
            background-color: #0070f3;
            border-color: #0070f3;
        }

        /* The Domino Container */
        .domino {
            width: 100%;
            max-width: 400px;
            height: 80vh; 
            background-color: #2a2a2a;
            border: 6px solid #fff;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .domino::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 5%;
            right: 5%;
            height: 6px;
            background-color: #fff;
            transform: translateY(-50%);
            border-radius: 3px;
        }

        .domino-half {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 20px;
            padding: 30px;
            align-items: center;
            justify-items: center;
        }

        .pip {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background-color: #fff;
            border: 3px solid #fff;
            transition: background-color 0.2s, transform 0.1s;
            cursor: pointer;
        }

        .pip.black {
            background-color: #000;
        }

        .pip:active {
            transform: scale(0.92);
        }

        .input-square {
            width: 65px;
            height: 65px;
            border: 3px solid #fff;
            background-color: transparent;
            color: #fff;
            border-radius: 8px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            outline: none;
        }

        .input-square:focus {
            border-color: #0070f3;
            background-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="nav-btn active">Page 1</a>
        <a href="page2.html" class="nav-btn">Page 2</a>
    </div>

    <div class="domino">
        <div class="domino-half" id="top-half">
            <input type="text" class="input-square" maxlength="2">
            <input type="text" class="input-square" maxlength="2">
            <div class="pip" onclick="togglePip(this)"></div>
            <div class="pip" onclick="togglePip(this)"></div>
            <div class="pip" onclick="togglePip(this)"></div>
            <div class="pip" onclick="togglePip(this)"></div>
        </div>

        <div class="domino-half" id="bottom-half">
            <div class="pip" onclick="togglePip(this)"></div>
            <div class="pip" onclick="togglePip(this)"></div>
            <div class="pip" onclick="togglePip(this)"></div>
            <div class="pip" onclick="togglePip(this)"></div>
            <input type="text" class="input-square" maxlength="2">
            <input type="text" class="input-square" maxlength="2">
        </div>
    </div>

    <script>
        function togglePip(element) {
            element.classList.toggle('black');
        }
    </script>

</body>
</html>
